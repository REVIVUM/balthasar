version: "3.9"

services:
  resposta:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resposta-api
    ports:
      - "8082:80"
    volumes:
      - ./src:/var/www/html/src
      - ./public:/var/www/html/public
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
    networks:
      - clinical-net
    restart: unless-stopped

networks:
  clinical-net: